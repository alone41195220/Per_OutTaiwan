<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutTaiwan</title>
    <link rel="stylesheet" href="../css/layout.css">
    <!-- CDNs -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            console.error("Global Error:", message, "at", source, ":", lineno, ":", colno);
            if (error) console.error(error);
            return false;
        };
    </script>
</head>
<body>
    <div id="app">
        <LayoutComponent title="OutTaiwan">
            <!-- Page content will be injected here -->
            <div id="content-area">
                <!-- Content will be injected here -->
            </div>
        </LayoutComponent>
    </div>

    <script type="module" src="./Layout.ts"></script>
</body>
</html>
